<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="بوابة دخول إدارة مراكز مصر للتأهيل | Masr Rehab" />
    <title>دخول الإدارة | Masr Rehab</title>
    <style>
      :root {
        --deep: #073b31;
        --deep-2: #0a4c3f;
        --mint: #76d6a4;
        --beige: #f5ecd9;
        --white: #ffffff;
        --danger: #ffdad2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: "Cairo", "Tajawal", "Segoe UI", Tahoma, Arial, sans-serif;
        color: var(--white);
        background-image:
          linear-gradient(135deg, rgba(7, 59, 49, 0.9), rgba(7, 59, 49, 0.56)),
          url("https://images.pexels.com/photos/5793904/pexels-photo-5793904.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=1080&w=1920");
        background-position: center;
        background-size: cover;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        pointer-events: none;
      }

      body::before {
        width: 38rem;
        height: 38rem;
        top: -13rem;
        right: -10rem;
        background: radial-gradient(circle, rgba(118, 214, 164, 0.38), transparent 64%);
        animation: glow 7s ease-in-out infinite;
      }

      body::after {
        width: 25rem;
        height: 25rem;
        left: -7rem;
        bottom: -9rem;
        border: 1px solid rgba(255, 255, 255, 0.22);
        box-shadow: inset 0 0 80px rgba(245, 236, 217, 0.12);
        animation: spinOrb 18s linear infinite;
      }

      main {
        width: min(92vw, 460px);
        perspective: 1200px;
      }

      .login-card {
        position: relative;
        padding: 2.2rem;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 34px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.08));
        box-shadow: 0 35px 100px rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(22px);
        transform-style: preserve-3d;
        animation: cardIn 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) both, floatCard 6s ease-in-out 1s infinite;
      }

      .login-card::before {
        content: "";
        position: absolute;
        inset: 18px;
        z-index: -1;
        border-radius: 26px;
        border: 1px solid rgba(118, 214, 164, 0.22);
        transform: translateZ(-42px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.8rem;
        margin-bottom: 2.2rem;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 54px;
        height: 54px;
        border-radius: 18px;
        background: linear-gradient(145deg, var(--mint), var(--beige));
        color: var(--deep);
        font-weight: 950;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin: 0;
        color: var(--white);
        font-size: clamp(2rem, 8vw, 3.7rem);
        line-height: 1.05;
        letter-spacing: -0.06em;
      }

      p {
        margin: 1rem 0 1.7rem;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.9;
      }

      label {
        display: block;
        margin-bottom: 0.55rem;
        font-weight: 900;
      }

      input {
        width: 100%;
        min-height: 56px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 18px;
        outline: 0;
        background: rgba(255, 255, 255, 0.16);
        color: var(--white);
        padding: 0.95rem 1rem;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.56);
      }

      input:focus {
        border-color: rgba(118, 214, 164, 0.9);
        box-shadow: 0 0 0 4px rgba(118, 214, 164, 0.18);
        transform: translateY(-2px);
      }

      button,
      a {
        font: inherit;
      }

      .actions {
        display: flex;
        gap: 0.8rem;
        margin-top: 1rem;
      }

      button,
      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        border: 0;
        border-radius: 999px;
        padding: 0.85rem 1.25rem;
        cursor: pointer;
        font-weight: 950;
        text-decoration: none;
        transition: transform 0.22s ease, box-shadow 0.22s ease;
      }

      button {
        flex: 1;
        background: linear-gradient(135deg, var(--mint), var(--beige));
        color: var(--deep);
        box-shadow: 0 18px 40px rgba(118, 214, 164, 0.24);
      }

      .back-link {
        border: 1px solid rgba(255, 255, 255, 0.22);
        color: var(--white);
        background: rgba(255, 255, 255, 0.1);
      }

      button:hover,
      .back-link:hover {
        transform: translateY(-3px);
      }

      .message {
        min-height: 24px;
        margin-top: 0.9rem;
        color: var(--danger);
        font-weight: 800;
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(28px) rotateX(12deg) rotateY(-8deg);
        }
        to {
          opacity: 1;
          transform: translateY(0) rotateX(0) rotateY(0);
        }
      }

      @keyframes floatCard {
        0%,
        100% {
          transform: translateY(0) rotateX(0) rotateY(0);
        }
        50% {
          transform: translateY(-10px) rotateX(2deg) rotateY(-2deg);
        }
      }

      @keyframes glow {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.08);
          opacity: 1;
        }
      }

      @keyframes spinOrb {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 520px) {
        .login-card {
          padding: 1.3rem;
          border-radius: 26px;
        }

        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="login-card" aria-labelledby="loginTitle">
        <div class="brand">
          <span class="brand-mark">MR</span>
          <strong>مراكز مصر للتأهيل<br />Masr Rehab</strong>
        </div>
        <h1 id="loginTitle">بوابة الإدارة</h1>
        <p>دخول سريع لموظفي الاستقبال لمتابعة الحجوزات الواردة لحظياً من Firestore.</p>
        <label for="password">كلمة المرور</label>
        <input id="password" type="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" autofocus />
        <div class="actions">
          <button id="loginBtn" type="button">دخول اللوحة</button>
          <a class="back-link" href="/index.html">الرئيسية</a>
        </div>
        <div id="message" class="message" role="alert" aria-live="assertive"></div>
      </section>
    </main>

    <script>
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const message = document.getElementById("message");

      function login() {
        if (passwordInput.value === "hamza") {
          sessionStorage.setItem("admin_access", "true");
          window.location.href = "dashboard.html";
          return;
        }

        message.textContent = "كلمة المرور غير صحيحة.";
        passwordInput.value = "";
        passwordInput.focus();
      }

      loginBtn.addEventListener("click", login);
      passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          login();
        }
      });
    </script>
  </body>
</html>
